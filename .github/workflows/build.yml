name: Release

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  bump_version:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      new_tag: ${{ steps.tag_version.outputs.new_tag }}
    steps:
      - uses: actions/checkout@v4
      - name: Bump version and push tag
        id: tag_version
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          default_bump: patch

  build-qt:
    needs: bump_version
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: "windows-latest"
            os: "windows"
            qt_arch: "win64_msvc2022_64"
          - platform: "ubuntu-22.04"
            os: "ubuntu"
            qt_arch: "linux_gcc_64"

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.8.2'
          target: 'desktop'
          arch: ${{ matrix.qt_arch }}
          modules: 'qtcharts'

      - name: Install Linux Dependencies
        if: matrix.os == 'ubuntu'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libgl1-mesa-dev cmake ninja-build zip

      - name: Build Project (Ubuntu)
        if: matrix.os == 'ubuntu'
        run: |
          mkdir build && cd build
          cmake ../app -DCMAKE_BUILD_TYPE=Release -G Ninja
          cmake --build . --config Release

      - name: Build Project (Windows)
        if: matrix.os == 'windows'
        run: |
          mkdir build
          cd build
          cmake ../app -DCMAKE_BUILD_TYPE=Release
          cmake --build . --config Release

      - name: Deploy Windows (.exe)
        if: matrix.os == 'windows'
        run: |
          mkdir release_package
          Copy-Item build/Release/app.exe release_package/ -ErrorAction SilentlyContinue
          if (-not (Test-Path release_package/app.exe)) { Copy-Item build/app.exe release_package/ }
          windeployqt release_package/app.exe
          Compress-Archive -Path release_package\* -DestinationPath FonctionPublique-Windows.zip

      - name: Deploy Linux (Zip)
        if: matrix.os == 'ubuntu'
        run: |
          mkdir -p release_package
          cp build/app release_package/
          # Copier les bibliothèques Qt nécessaires
          ldd build/app | grep "Qt" | awk '{print $3}' | xargs -I{} cp {} release_package/ 2>/dev/null || true
          cp -r $Qt6_DIR/plugins/platforms release_package/ 2>/dev/null || true
          cp -r $Qt6_DIR/plugins/sqldrivers release_package/ 2>/dev/null || true
          zip -r FonctionPublique-Linux.zip release_package

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ needs.bump_version.outputs.new_tag }}
          files: |
            FonctionPublique-Windows.zip
            FonctionPublique-Linux.zip
          name: "Fonction Publique - ${{ needs.bump_version.outputs.new_tag }}"
          body: "Build automatique C++ généré via GitHub Actions pour Windows et Linux."
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
