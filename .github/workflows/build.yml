name: Release

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  bump_version:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      new_tag: ${{ steps.tag_version.outputs.new_tag }}
    steps:
      - uses: actions/checkout@v4
      - name: Bump version and push tag
        id: tag_version
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          default_bump: patch

  build-qt:
    needs: bump_version
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: "windows-latest"
            os: "windows"
            qt_arch: "win64_msvc2022_64"
          - platform: "ubuntu-22.04"
            os: "ubuntu"
            qt_arch: "linux_gcc_64"

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.8.2'
          target: 'desktop'
          arch: ${{ matrix.qt_arch }}
          modules: 'qtcharts'

      - name: Install Linux Dependencies
        if: matrix.os == 'ubuntu'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libgl1-mesa-dev cmake ninja-build zip

      - name: Build Project (Ubuntu)
        if: matrix.os == 'ubuntu'
        run: |
          mkdir build && cd build
          cmake ../app -DCMAKE_BUILD_TYPE=Release -G Ninja
          cmake --build . --config Release

      - name: Build Project (Windows)
        if: matrix.os == 'windows'
        run: |
          mkdir build
          cd build
          cmake ../app -DCMAKE_BUILD_TYPE=Release
          cmake --build . --config Release

      - name: Deploy Windows (.exe)
        if: matrix.os == 'windows'
        run: |
          mkdir release_package
          Copy-Item build/Release/app.exe release_package/fpub.exe -ErrorAction SilentlyContinue
          if (-not (Test-Path release_package/fpub.exe)) { Copy-Item build/app.exe release_package/fpub.exe }
          windeployqt release_package/fpub.exe
          Compress-Archive -Path release_package\* -DestinationPath FonctionPublique-Windows.zip

      - name: Create Windows Installer (NSIS)
        if: matrix.os == 'windows'
        run: |
          choco install nsis -y
          @"
          !include "MUI2.nsh"

          Name "Fonction Publique Kwilu"
          OutFile "FonctionPublique-Setup.exe"
          InstallDir "`$PROGRAMFILES\Fonction Publique Kwilu"
          RequestExecutionLevel admin

          !define MUI_ABORTWARNING
          !define MUI_ICON "`${NSISDIR}\Contrib\Graphics\Icons\modern-install.ico"

          !insertmacro MUI_PAGE_WELCOME
          !insertmacro MUI_PAGE_DIRECTORY
          !insertmacro MUI_PAGE_INSTFILES
          !insertmacro MUI_PAGE_FINISH

          !insertmacro MUI_UNPAGE_CONFIRM
          !insertmacro MUI_UNPAGE_INSTFILES

          !insertmacro MUI_LANGUAGE "French"

          Section "Install"
            SetOutPath "`$INSTDIR"
            File /r "release_package\*.*"

            ; Raccourci Bureau
            CreateShortcut "`$DESKTOP\Fonction Publique Kwilu.lnk" "`$INSTDIR\fpub.exe"

            ; Raccourci Menu Démarrer
            CreateDirectory "`$SMPROGRAMS\Fonction Publique Kwilu"
            CreateShortcut "`$SMPROGRAMS\Fonction Publique Kwilu\Fonction Publique.lnk" "`$INSTDIR\fpub.exe"
            CreateShortcut "`$SMPROGRAMS\Fonction Publique Kwilu\Désinstaller.lnk" "`$INSTDIR\uninstall.exe"

            ; Désinstalleur
            WriteUninstaller "`$INSTDIR\uninstall.exe"

            ; Ajout/Suppression de programmes
            WriteRegStr HKLM "Software\Microsoft\Windows\CurrentVersion\Uninstall\FonctionPublique" "DisplayName" "Fonction Publique Kwilu"
            WriteRegStr HKLM "Software\Microsoft\Windows\CurrentVersion\Uninstall\FonctionPublique" "Publisher" "Nartrixsoft"
            WriteRegStr HKLM "Software\Microsoft\Windows\CurrentVersion\Uninstall\FonctionPublique" "UninstallString" "`$INSTDIR\uninstall.exe"
          SectionEnd

          Section "Uninstall"
            RMDir /r "`$INSTDIR"
            Delete "`$DESKTOP\Fonction Publique Kwilu.lnk"
            RMDir /r "`$SMPROGRAMS\Fonction Publique Kwilu"
            DeleteRegKey HKLM "Software\Microsoft\Windows\CurrentVersion\Uninstall\FonctionPublique"
          SectionEnd
          "@ | Out-File -FilePath installer.nsi -Encoding UTF8

          makensis installer.nsi

      - name: Deploy Linux (Zip + Deb + Run)
        if: matrix.os == 'ubuntu'
        run: |
          mkdir -p release_package/lib release_package/plugins
          cp build/app release_package/fpub

          # On ajoute Qt6_DIR/lib au path pour que ldd puisse résoudre les dépendances des plugins
          export LD_LIBRARY_PATH="$Qt6_DIR/lib:$LD_LIBRARY_PATH"

          # Copier TOUTES les bibliothèques Qt et dépendances nécessaires pour l'exécutable
          for lib in $(ldd build/app | grep -E "Qt|icu|xcb|xkb|GL|wayland|ffi|EGL|GLES|dbus" | awk '{print $3}'); do
            [ -f "$lib" ] && cp -n "$lib" release_package/lib/ 2>/dev/null || true
          done

          # Copier les plugins Qt (indispensable pour le démarrage)
          for plugin_dir in platforms sqldrivers xcbglintegrations wayland-shell-integration imageformats; do
            [ -d "$Qt6_DIR/plugins/$plugin_dir" ] && cp -r "$Qt6_DIR/plugins/$plugin_dir" release_package/plugins/
          done

          # Scanner les plugins pour copier LEURS sous-dépendances
          for lib in $(find release_package/plugins -name "*.so" -exec ldd {} \; | grep -E "Qt|icu|xcb|xkb|GL|wayland|ffi|EGL|GLES|dbus" | awk '{print $3}'); do
            [ -f "$lib" ] && cp -n "$lib" release_package/lib/ 2>/dev/null || true
          done

          # Script de lancement portable
          cat > release_package/fpub.sh << 'LAUNCH'
          #!/bin/bash
          SCRIPT_DIR="$(cd "$(dirname "$0")" && pwd)"
          export LD_LIBRARY_PATH="$SCRIPT_DIR/lib:$LD_LIBRARY_PATH"
          export QT_PLUGIN_PATH="$SCRIPT_DIR/plugins"
          export QT_QPA_PLATFORM_PLUGIN_PATH="$SCRIPT_DIR/plugins/platforms"
          exec "$SCRIPT_DIR/fpub" "$@"
          LAUNCH
          sed -i 's/^          //' release_package/fpub.sh
          chmod +x release_package/fpub.sh
          chmod +x release_package/fpub

          zip -r FonctionPublique-Linux.zip release_package

          # ========== Paquet .deb ==========
          PKG_DIR=fpub_1.0_amd64
          mkdir -p $PKG_DIR/DEBIAN
          mkdir -p $PKG_DIR/opt/fpub/lib
          mkdir -p $PKG_DIR/opt/fpub/plugins
          mkdir -p $PKG_DIR/usr/local/bin
          mkdir -p $PKG_DIR/usr/share/applications

          cat > $PKG_DIR/DEBIAN/control << EOF
          Package: fpub
          Version: 1.0
          Section: admin
          Priority: optional
          Architecture: amd64
          Maintainer: Nartrixsoft <contact@nartrixsoft.com>
          Homepage: https://nartrixsoft.com
          Description: Fonction Publique Kwilu - Plateforme Administrative
           Application de gestion de la Fonction Publique Provinciale (Kwilu).
           Développée par Nartrixsoft.
          EOF
          sed -i 's/^          //' $PKG_DIR/DEBIAN/control

          cp release_package/fpub $PKG_DIR/opt/fpub/
          cp release_package/lib/* $PKG_DIR/opt/fpub/lib/ 2>/dev/null || true
          cp -r release_package/plugins/* $PKG_DIR/opt/fpub/plugins/ 2>/dev/null || true
          chmod +x $PKG_DIR/opt/fpub/fpub

          cat > $PKG_DIR/usr/local/bin/fpub << 'LAUNCHER'
          #!/bin/bash
          export LD_LIBRARY_PATH=/opt/fpub/lib:$LD_LIBRARY_PATH
          export QT_PLUGIN_PATH=/opt/fpub/plugins
          export QT_QPA_PLATFORM_PLUGIN_PATH=/opt/fpub/plugins/platforms
          exec /opt/fpub/fpub "$@"
          LAUNCHER
          sed -i 's/^          //' $PKG_DIR/usr/local/bin/fpub
          chmod +x $PKG_DIR/usr/local/bin/fpub

          cat > $PKG_DIR/usr/share/applications/fpub.desktop << 'DESKTOP'
          [Desktop Entry]
          Name=Fonction Publique Kwilu
          Comment=Plateforme administrative - Nartrixsoft
          Exec=fpub
          Terminal=false
          Type=Application
          Categories=Office;
          DESKTOP
          sed -i 's/^          //' $PKG_DIR/usr/share/applications/fpub.desktop

          dpkg-deb --build $PKG_DIR
          mv ${PKG_DIR}.deb FonctionPublique-Linux.deb

          # ========== Installateur .run ==========
          sudo apt-get install -y makeself

          INSTALLER_DIR=installer_payload
          mkdir -p $INSTALLER_DIR/app
          cp -r release_package/* $INSTALLER_DIR/app/

          cat > $INSTALLER_DIR/setup.sh << 'SETUP'
          #!/bin/bash
          echo ""
          echo "╔══════════════════════════════════════════════════════════╗"
          echo "║      Fonction Publique Kwilu - Installateur Linux       ║"
          echo "║              Éditeur : Nartrixsoft                      ║"
          echo "╚══════════════════════════════════════════════════════════╝"
          echo ""

          INSTALL_DIR="/opt/fpub"

          echo "L'application sera installée dans : $INSTALL_DIR"
          read -p "Continuer l'installation ? [O/n] " confirm
          if [ "$confirm" = "n" ] || [ "$confirm" = "N" ]; then
              echo "Installation annulée."
              exit 0
          fi

          echo ""
          echo ">> Installation en cours..."

          sudo mkdir -p "$INSTALL_DIR"
          sudo cp -r app/* "$INSTALL_DIR/"
          sudo chmod +x "$INSTALL_DIR/fpub"

          # Créer le lanceur système
          sudo tee /usr/local/bin/fpub > /dev/null << 'INNER'
          #!/bin/bash
          export LD_LIBRARY_PATH=/opt/fpub/lib:$LD_LIBRARY_PATH
          export QT_PLUGIN_PATH=/opt/fpub/plugins
          export QT_QPA_PLATFORM_PLUGIN_PATH=/opt/fpub/plugins/platforms
          exec /opt/fpub/fpub "$@"
          INNER
          sudo chmod +x /usr/local/bin/fpub

          # Raccourci dans le menu Applications
          sudo tee /usr/share/applications/fpub.desktop > /dev/null << 'DSKTP'
          [Desktop Entry]
          Name=Fonction Publique Kwilu
          Comment=Plateforme administrative - Nartrixsoft
          Exec=fpub
          Terminal=false
          Type=Application
          Categories=Office;
          DSKTP

          echo ""
          echo "✅ Installation terminée avec succès !"
          echo "   Lancez l'application avec : fpub"
          echo "   Ou depuis le menu Applications > Fonction Publique Kwilu"
          echo ""
          SETUP
          sed -i 's/^          //' $INSTALLER_DIR/setup.sh
          chmod +x $INSTALLER_DIR/setup.sh

          makeself $INSTALLER_DIR FonctionPublique-Linux-Setup.run \
            "Fonction Publique Kwilu - Nartrixsoft" \
            ./setup.sh

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ needs.bump_version.outputs.new_tag }}
          files: |
            FonctionPublique-Setup.exe
            FonctionPublique-Windows.zip
            FonctionPublique-Linux-Setup.run
            FonctionPublique-Linux.zip
            FonctionPublique-Linux.deb
          name: "Fonction Publique - ${{ needs.bump_version.outputs.new_tag }}"
          body: "Build automatique C++ généré via GitHub Actions pour Windows et Linux."
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
