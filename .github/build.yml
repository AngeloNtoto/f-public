name: Release

on:
  push:
    branches:
      - master
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build-qt:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: "windows-latest"
            os: "windows"
          - platform: "ubuntu-22.04"
            os: "ubuntu"

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Qt
        uses: jurplel/install-qt-action@v3
        with:
          version: '6.5.3'
          host: ${{ matrix.os == 'windows' && 'windows' || 'linux' }}
          target: 'desktop'
          arch: ${{ matrix.os == 'windows' && 'win64_msvc2019_64' || 'gcc_64' }}
          modules: 'qtcharts'

      - name: Install Linux Dependencies
        if: matrix.os == 'ubuntu'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libgl1-mesa-dev cmake ninja-build zip

      - name: Build Project (Ubuntu)
        if: matrix.os == 'ubuntu'
        run: |
          mkdir build && cd build
          cmake ../app -DCMAKE_BUILD_TYPE=Release
          cmake --build . --config Release

      - name: Build Project (Windows)
        if: matrix.os == 'windows'
        run: |
          mkdir build
          cd build
          cmake ../app -DCMAKE_BUILD_TYPE=Release
          cmake --build . --config Release

      - name: Deploy Windows (.exe)
        if: matrix.os == 'windows'
        run: |
          mkdir release_package
          # CMake with MSVC usually outputs in a Release subfolder
          cp build/Release/app.exe release_package/ || cp build/app.exe release_package/
          windeployqt release_package/app.exe
          Compress-Archive -Path release_package\* -DestinationPath FonctionPublique-Windows.zip

      - name: Deploy Linux (.deb & Zip)
        if: matrix.os == 'ubuntu'
        run: |
          # Installation de CQtDeployer via snap (supporté nativement sur les runners ubuntu)
          sudo snap install cqtdeployer
          # Empaquetage du binaire et génération du .deb
          cqtdeployer -bin build/app -qmake $(which qmake) -clear -deb
          # Compression du dossier autonome pour ceux qui ne veulent pas le .deb
          zip -r FonctionPublique-Linux.zip DistributionKit

      - name: Create Release
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
        with:
          files: |
            FonctionPublique-Windows.zip
            FonctionPublique-Linux.zip
            DistributionKit/*.deb
          name: "Fonction Publique - ${{ github.ref_name || 'Release' }}"
          body: "Build automatique C++ généré via GitHub Actions pour Windows et Linux."
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
